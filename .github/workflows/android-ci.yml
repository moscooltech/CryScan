name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NDK_VERSION: '26.3.11579264'
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & Test (every push/PR)
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          # Update cmdline-tools to avoid SDK XML version mismatches
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "cmdline-tools;latest"

          # Detect an available CMake package from the SDK list (pick newest available)
          AVAILABLE_CMAKE=$($ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>/dev/null | grep -Eo 'cmake;[0-9]+\.[0-9]+(\.[0-9]+)?' | sort -V | tail -n1)
          if [ -z "$AVAILABLE_CMAKE" ]; then
            echo "No CMake package detected from sdkmanager; falling back to cmake;3.10.2"
            AVAILABLE_CMAKE="cmake;3.10.2"
          fi
          # Extract version only (e.g. 3.10.2)
          DETECTED_CMAKE_VERSION=${AVAILABLE_CMAKE#cmake;}
          echo "CMAKE_VERSION=$DETECTED_CMAKE_VERSION" >> $GITHUB_ENV
          echo "Installing: $AVAILABLE_CMAKE (exported CMAKE_VERSION=$DETECTED_CMAKE_VERSION)"

          # Install NDK, the detected CMake, and other required components
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "$AVAILABLE_CMAKE" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;34.0.0"

          # Ensure Gradle and CMake can find the NDK: write ndk.dir and export env vars
          REQUESTED_NDK_VERSION="${{ env.NDK_VERSION }}"
          if [ -d "$ANDROID_HOME/ndk/$REQUESTED_NDK_VERSION" ]; then
            NDK_DIR="$ANDROID_HOME/ndk/$REQUESTED_NDK_VERSION"
          else
            # fallback: pick newest ndk installed under $ANDROID_HOME/ndk
            NDK_DIR=$(ls -1d $ANDROID_HOME/ndk/* 2>/dev/null | sort -V | tail -n1 || true)
          fi

          if [ -n "$NDK_DIR" ] && [ -d "$NDK_DIR" ]; then
            echo "ndk.dir=$NDK_DIR" >> local.properties
            echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
            echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
            echo "PATH=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV
            echo "Wrote local.properties ndk.dir=$NDK_DIR and exported Android NDK env vars"
          else
            echo "Warning: NDK not found at expected locations; Gradle may not find NDK"
          fi

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache NDK build outputs
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            ndk-${{ runner.os }}-${{ env.NDK_VERSION }}-

      - name: Cache CMake FetchContent downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cmake/packages
            app/.cxx/cmake
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/CMakeLists.txt') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate Gradle wrapper
        run: |
          for i in 1 2 3 4 5; do
            ./gradlew --version && break
            echo "Gradle wrapper validation failed (attempt $i), retrying in 10s..."
            sleep 10
          done

      - name: Run Android Lint
        run: ./gradlew lint --continue
        continue-on-error: true

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -PBLOCKCYPHER_TOKEN="" \
            -PINFURA_PROJECT_ID=""

      - name: Run JVM Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Get APK info
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | $APK |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # Job 2: Build all ABIs explicitly (validation)
  # ──────────────────────────────────────────────
  build-multi-abi:
    name: Build ABI ${{ matrix.abi }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build-and-test
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - run: |
          # Update cmdline-tools to avoid SDK XML version mismatches
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "cmdline-tools;latest"

          # Detect an available CMake package from the SDK list (pick newest available)
          AVAILABLE_CMAKE=$($ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>/dev/null | grep -Eo 'cmake;[0-9]+\.[0-9]+(\.[0-9]+)?' | sort -V | tail -n1)
          if [ -z "$AVAILABLE_CMAKE" ]; then
            echo "No CMake package detected from sdkmanager; falling back to cmake;3.10.2"
            AVAILABLE_CMAKE="cmake;3.10.2"
          fi
          # Extract version only (e.g. 3.10.2)
          DETECTED_CMAKE_VERSION=${AVAILABLE_CMAKE#cmake;}
          echo "CMAKE_VERSION=$DETECTED_CMAKE_VERSION" >> $GITHUB_ENV
          echo "Installing: $AVAILABLE_CMAKE (exported CMAKE_VERSION=$DETECTED_CMAKE_VERSION)"

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "$AVAILABLE_CMAKE" \
            "platforms;android-35" \
            "build-tools;34.0.0"

          # Ensure Gradle and CMake can find the NDK: write ndk.dir and export env vars
          REQUESTED_NDK_VERSION="${{ env.NDK_VERSION }}"
          if [ -d "$ANDROID_HOME/ndk/$REQUESTED_NDK_VERSION" ]; then
            NDK_DIR="$ANDROID_HOME/ndk/$REQUESTED_NDK_VERSION"
          else
            # fallback: pick newest ndk installed under $ANDROID_HOME/ndk
            NDK_DIR=$(ls -1d $ANDROID_HOME/ndk/* 2>/dev/null | sort -V | tail -n1 || true)
          fi

          if [ -n "$NDK_DIR" ] && [ -d "$NDK_DIR" ]; then
            echo "ndk.dir=$NDK_DIR" >> local.properties
            echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
            echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
            echo "PATH=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV
            echo "Wrote local.properties ndk.dir=$NDK_DIR and exported Android NDK env vars"
          else
            echo "Warning: NDK not found at expected locations; Gradle may not find NDK"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: ndk-${{ matrix.abi }}-${{ hashFiles('app/src/main/cpp/**') }}

      - run: chmod +x ./gradlew

      - name: Build for ${{ matrix.abi }}
        run: |
          ./gradlew assembleDebug \
            -PabiFilter="${{ matrix.abi }}" \
            --stacktrace

      - name: Verify .so file exists
        run: |
          find app/build -name "libcryptoscanner.so" | grep "${{ matrix.abi }}" || \
            (echo "ERROR: libcryptoscanner.so not found for ${{ matrix.abi }}" && exit 1)

  # ──────────────────────────────────────────────
  # Job 3: Release (on version tags: v*)
  # ──────────────────────────────────────────────
  release:
    name: Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build-and-test, build-multi-abi]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - run: |
          # Update cmdline-tools to avoid SDK XML version mismatches
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "cmdline-tools;latest"

          # Detect an available CMake package from the SDK list (pick newest available)
          AVAILABLE_CMAKE=$($ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>/dev/null | grep -Eo 'cmake;[0-9]+\.[0-9]+(\.[0-9]+)?' | sort -V | tail -n1)
          if [ -z "$AVAILABLE_CMAKE" ]; then
            echo "No CMake package detected from sdkmanager; falling back to cmake;3.10.2"
            AVAILABLE_CMAKE="cmake;3.10.2"
          fi
          # Extract version only (e.g. 3.10.2)
          DETECTED_CMAKE_VERSION=${AVAILABLE_CMAKE#cmake;}
          echo "CMAKE_VERSION=$DETECTED_CMAKE_VERSION" >> $GITHUB_ENV
          echo "Installing: $AVAILABLE_CMAKE (exported CMAKE_VERSION=$DETECTED_CMAKE_VERSION)"

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "$AVAILABLE_CMAKE" \
            "platforms;android-35" \
            "build-tools;34.0.0"

          REQUESTED_CMAKE_VERSION="3.26.4"
          INSTALLED_ROOT="$ANDROID_HOME/cmake/$DETECTED_CMAKE_VERSION"
          REQUESTED_ROOT="$ANDROID_HOME/cmake/$REQUESTED_CMAKE_VERSION"
          if [ -d "$INSTALLED_ROOT" ]; then
            if [ "$DETECTED_CMAKE_VERSION" != "$REQUESTED_CMAKE_VERSION" ]; then
              mkdir -p "$ANDROID_HOME/cmake"
              if [ -e "$REQUESTED_ROOT" ]; then
                echo "$REQUESTED_ROOT already exists"
              else
                ln -s "$INSTALLED_ROOT" "$REQUESTED_ROOT"
                echo "Created symlink: $REQUESTED_ROOT -> $INSTALLED_ROOT"
              fi
            fi
            echo "cmake.dir=$REQUESTED_ROOT" >> local.properties
            echo "PATH=$REQUESTED_ROOT/bin:$PATH" >> $GITHUB_ENV
            echo "Wrote local.properties cmake.dir=$REQUESTED_ROOT and exported PATH"
          else
            echo "Warning: expected installed CMake root $INSTALLED_ROOT not found"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: ndk-release-${{ hashFiles('app/src/main/cpp/**') }}

      - run: chmod +x ./gradlew

      # ── Option A: Use provided keystore secret (preferred) ──
      - name: Decode Keystore from Secret
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          mkdir -p keystore
          echo "${{ env.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > keystore/release.jks
          echo "SIGNING_MODE=secret" >> $GITHUB_ENV
        continue-on-error: true

      # ── Option B: Generate throwaway keystore (fallback) ──
      - name: Generate CI Keystore (fallback)
        if: env.SIGNING_MODE != 'secret'
        run: |
          mkdir -p keystore
          # Generate CI-generated keystore with fixed passwords
          keytool -genkeypair \
            -alias cryptoscanner-ci \
            -keyalg RSA \
            -keysize 4096 \
            -validity 10000 \
            -keystore keystore/release.jks \
            -storepass "CryptoScannerCI2024" \
            -keypass "CryptoScannerCI2024" \
            -dname "CN=CryptoScanner CI, OU=CI, O=CryptoScanner, L=Unknown, S=Unknown, C=US"
            
          echo "KEYSTORE_PASSWORD=CryptoScannerCI2024" >> $GITHUB_ENV
          echo "KEY_ALIAS=cryptoscanner-ci" >> $GITHUB_ENV
          echo "KEY_PASSWORD=CryptoScannerCI2024" >> $GITHUB_ENV
          echo "SIGNING_MODE=generated" >> $GITHUB_ENV
          echo "⚠️ Using CI-generated throwaway keystore. Not for Play Store distribution." >> $GITHUB_STEP_SUMMARY

      - name: Build Release APK (signed)
        run: |
          ./gradlew assembleRelease \
            -PRELEASE_KEYSTORE_PATH="$(pwd)/keystore/release.jks" \
            -PRELEASE_KEYSTORE_PASSWORD="${{ env.KEYSTORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ env.KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ env.KEY_PASSWORD }}" \
            --stacktrace

      - name: Get release version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK files
        run: |
          mkdir -p release_artifacts
          for apk in app/build/outputs/apk/release/*.apk; do
            basename=$(basename "$apk" .apk)
            cp "$apk" "release_artifacts/CryptoScanner-${{ steps.version.outputs.VERSION }}-${basename}.apk"
          done
          ls -la release_artifacts/

      - name: Generate SHA256 checksums
        run: |
          cd release_artifacts
          sha256sum *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "CryptoScanner ${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}
          generate_release_notes: true
          files: |
            release_artifacts/*.apk
            release_artifacts/SHA256SUMS.txt
          body: |
            ## CryptoScanner ${{ steps.version.outputs.VERSION }}
            
            ### Downloads
            Download the APK for your device architecture:
            - **arm64-v8a** — Modern 64-bit ARM devices (most phones since 2019)
            - **armeabi-v7a** — Older 32-bit ARM devices
            - **x86_64** — x86 emulators (Android Studio)
            - **x86** — 32-bit x86 emulators
            
            ### Installation
            1. Enable "Install from unknown sources" in device settings
            2. Download the appropriate APK
            3. Open and install
            
            ### Signing
            ${{ env.SIGNING_MODE == 'generated' && '⚠️ Signed with CI-generated throwaway keystore (safe to install, not Play Store eligible)' || '✅ Signed with official keystore' }}
            
            ### Checksums
            See `SHA256SUMS.txt` to verify download integrity.

  # ──────────────────────────────────────────────
  # Job 4: Dependency security scan (weekly)
  # ──────────────────────────────────────────────
  dependency-check:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - run: chmod +x ./gradlew

      - name: Run Dependency Updates Check
        run: ./gradlew dependencyUpdates --refresh-dependencies || true
        continue-on-error: true
